<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#FB923C" opacity="0.1" stroke="#FB923C" stroke-width="2"/>
  
  <!-- Mercury planet with ring -->
  <g>
    <!-- Planet circle (Mercury-inspired) -->
    <circle cx="100" cy="100" r="45" fill="#FB923C"/>
    <circle cx="100" cy="100" r="45" fill="url(#mercuryGradient)" opacity="0.8"/>
    
    <!-- Planet details -->
    <circle cx="85" cy="85" r="12" fill="#FFA500" opacity="0.6"/>
    <circle cx="115" cy="110" r="8" fill="#FF8C00" opacity="0.5"/>
    
    <!-- Orbital ring -->
    <ellipse cx="100" cy="100" rx="60" ry="20" fill="none" stroke="#FB923C" stroke-width="3" opacity="0.7" transform="rotate(-20 100 100)"/>
  </g>
  
  <!-- Digital signal lines -->
  <g stroke="#FB923C" stroke-width="2.5" fill="none" opacity="0.8">
    <!-- Left signal lines -->
    <path d="M 35 70 L 50 70" stroke-linecap="round"/>
    <path d="M 35 85 L 50 85" stroke-linecap="round"/>
    <path d="M 35 100 L 50 100" stroke-linecap="round"/>
    <path d="M 35 115 L 50 115" stroke-linecap="round"/>
    <path d="M 35 130 L 50 130" stroke-linecap="round"/>
    
    <!-- Right signal lines -->
    <path d="M 150 70 L 165 70" stroke-linecap="round"/>
    <path d="M 150 85 L 165 85" stroke-linecap="round"/>
    <path d="M 150 100 L 165 100" stroke-linecap="round"/>
    <path d="M 150 115 L 165 115" stroke-linecap="round"/>
    <path d="M 150 130 L 165 130" stroke-linecap="round"/>
  </g>
  
  <!-- Small dots (digital nodes) -->
  <g fill="#FB923C" opacity="0.9">
    <circle cx="30" cy="70" r="3"/>
    <circle cx="30" cy="85" r="3"/>
    <circle cx="30" cy="100" r="3"/>
    <circle cx="30" cy="115" r="3"/>
    <circle cx="30" cy="130" r="3"/>
    <circle cx="170" cy="70" r="3"/>
    <circle cx="170" cy="85" r="3"/>
    <circle cx="170" cy="100" r="3"/>
    <circle cx="170" cy="115" r="3"/>
    <circle cx="170" cy="130" r="3"/>
  </g>
  
  <!-- Defs for gradient -->
  <defs>
    <radialGradient id="mercuryGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>
